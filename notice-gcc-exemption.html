<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="美国 GCC 豁免操作说明">
    <title>美国 GCC 豁免操作 - 叉烧虫导航站</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <script>
        if (localStorage.getItem("navigation-theme") === "dark") {
            document.body.classList.add("dark");
        }
    </script>
    <main class="notice-page">
        <article class="notice-article gcc-notice-article">
            <div class="notice-topbar">
                <a class="notice-back" href="index.html#announcement">← 返回公告</a>
                <button id="themeToggle" class="notice-theme-toggle" type="button" aria-label="切换深色模式">🌙</button>
            </div>

            <header class="notice-header">
                <span class="notice-label">合规指引</span>
                <h1>美国 GCC 豁免操作</h1>
                <p class="notice-date">发布于 2026-07-19</p>
            </header>

            <div class="notice-lead gcc-principle">
                <span>总原则</span>
                面料、里布及套装各部件均须符合豁免要求。
            </div>

            <section class="gcc-content">
                <div class="gcc-question">
                    <h2>判断面料属于绒面还是光面</h2>
                </div>

                <div class="gcc-branches">
                    <section class="gcc-branch">
                        <div class="gcc-branch-heading">
                            <div>
                                <span class="gcc-path-label">路径 A</span>
                                <h2>绒面</h2>
                            </div>
                        </div>

                        <div class="gcc-rule">
                            <span class="gcc-rule-type">成分豁免</span>
                            <p>除丙烯酸、改性丙烯酸、尼龙、烯烃、聚酯、羊毛，不可含其他材料。</p>
                        </div>
                    </section>

                    <section class="gcc-branch">
                        <div class="gcc-branch-heading">
                            <div>
                                <span class="gcc-path-label">路径 B</span>
                                <h2>光面</h2>
                            </div>
                            <span class="gcc-choice-label">以下方式二选一</span>
                        </div>

                        <div class="gcc-rule-list">
                            <div class="gcc-rule">
                                <span class="gcc-rule-type">成分豁免</span>
                                <p>除丙烯酸、改性丙烯酸、尼龙、烯烃、聚酯、羊毛，不可含其他材料。</p>
                            </div>

                            <div class="gcc-rule">
                                <span class="gcc-rule-type">克重豁免</span>
                                <p>面料平方克重 &gt; 88.18 g/m²。</p>
                            </div>
                        </div>
                    </section>
                </div>

                <p class="gcc-learning-link">
                    <strong>学习链接：</strong>
                    <a
                        href="https://agentseller.temu.com/main/course/detail?courseId=2501030000019"
                        target="_blank"
                        rel="noopener noreferrer"
                    >打开 GCC 豁免学习课程 →</a>
                </p>
            </section>
        </article>
    </main>
    <script src="js/app.js"></script>
</body>
</html>
