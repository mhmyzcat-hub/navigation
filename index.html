<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="叉烧虫导航站"
    >

    <title>叉烧虫导航站</title>

    <link
        rel="stylesheet"
        href="css/style.css"
    >

    <link
        rel="stylesheet"
        href="css/responsive.css"
    >
</head>

<body>

    <header class="site-header">

        <div class="header-inner">

            <a
                class="site-logo"
                href="#top"
            >
                叉烧虫导航站
            </a>

            <nav class="top-navigation">

                <a href="#featuredPath">
                    上款路径
                </a>

                <a href="#section-contact">
                    联系方式
                </a>

                <a href="#section-hot">
                    开款推荐
                </a>

            </nav>

            <button
                id="themeToggle"
                class="theme-toggle"
                type="button"
                aria-label="切换深色模式"
            >
                🌙
            </button>

        </div>

    </header>

    <main
        id="top"
        class="page-container"
    >

        <!-- 男装正装横幅 -->
        <section
            class="hero-banner"
            aria-label="男装正装展示"
        ></section>

        <!-- 公告 -->
        <section
            id="announcement"
            class="announcement-section"
        >

            <div class="section-heading">

                <span class="section-heading-mark">
                    📢
                </span>

                <h1>
                    最新公告
                </h1>

            </div>

            <div
                id="announcementList"
                class="announcement-list"
            ></div>

        </section>

        <!-- 上款路径 -->
        <section
            id="featuredPath"
            class="featured-path"
        ></section>

        <!-- 分类内容 -->
        <div id="directoryContainer"></div>

    </main>

    <footer class="site-footer">

        <div class="footer-inner">

            <p id="footerCopyright">
                © 2026 叉烧虫导航站
            </p>

            <p id="lastUpdateText">
                最后更新：--
            </p>

        </div>

    </footer>

    <button
        id="backToTop"
        class="back-to-top"
        type="button"
        aria-label="返回顶部"
    >
        ↑
    </button>

    <div
        id="toast"
        class="toast"
    ></div>

    <script src="data/navigation.js"></script>
    <script src="js/render.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
